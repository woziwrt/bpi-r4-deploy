name: Build BPI-R4 Deploy

on:
  workflow_dispatch:
    inputs:
      ram:
        description: 'RAM variant'
        required: true
        default: '4gb'
        type: choice
        options:
          - 4gb
          - 8gb
      variant:
        description: 'Build variant'
        required: true
        default: 'standard'
        type: choice
        options:
          - standard
          - wired
      target:
        description: 'Board target'
        required: true
        default: 'non-poe'
        type: choice
        options:
          - non-poe
          - poe
      repo_commit:
        description: 'Commit hash of this repository (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.repo_commit || github.sha }}

      - name: Set build variables
        run: |
          RAM="${{ github.event.inputs.ram }}"
          VARIANT="${{ github.event.inputs.variant }}"
          TARGET="${{ github.event.inputs.target }}"
          echo "BUILDER=./builder-${RAM}-${VARIANT}.sh" >> $GITHUB_ENV
          echo "RELEASE_TAG=release-${RAM}-${VARIANT}-${TARGET}" >> $GITHUB_ENV
          echo "RELEASE_NAME=BPI-R4 ${RAM} ${VARIANT} ${TARGET} (latest)" >> $GITHUB_ENV

      - name: Delete existing release and tag
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;

            const releases = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });

            for (const rel of releases.data) {
              if (rel.tag_name === tag) {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: rel.id
                }).catch(e => console.log(`Failed to delete release ${rel.id}: ${e.message}`));
              }
            }

            await github.rest.git.deleteRef({
              owner,
              repo,
              ref: `tags/${tag}`
            }).catch(e => console.log(`Failed to delete tag ${tag}: ${e.message}`));
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space on runner
        run: |
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/ghc \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache git

      - name: Run builder script
        run: |
          chmod +x ${{ env.BUILDER }}
          ${{ env.BUILDER }}

      - name: Prepare artifacts
        run: |
          RAM="${{ github.event.inputs.ram }}"
          TARGET="${{ github.event.inputs.target }}"
          FILOGIC="openwrt/bin/targets/mediatek/filogic"

          mkdir -p artifacts

          # Select correct rescue image
          if [ "$RAM" = "8gb" ]; then
            cp rescue/bpi-r4-rescue-sdcard.8gb.img.gz artifacts/
          else
            cp rescue/bpi-r4-rescue-sdcard.img.gz artifacts/
          fi

          # Select correct target artifacts
          if [ "$TARGET" = "poe" ]; then
            PREFIX="bananapi_bpi-r4-poe"
            ITB="bpi-r4-poe.itb"
          else
            PREFIX="bananapi_bpi-r4"
            ITB="bpi-r4.itb"
          fi

          cp ${FILOGIC}/openwrt-mediatek-filogic-${PREFIX}-squashfs-sysupgrade.itb artifacts/${ITB}
          cp ${FILOGIC}/openwrt-mediatek-filogic-${PREFIX}-nvme-img.bin artifacts/
          cp ${FILOGIC}/openwrt-mediatek-filogic-${PREFIX}-sdcard.img.gz artifacts/
          cp ${FILOGIC}/openwrt-mediatek-filogic-${PREFIX}-emmc-img.bin artifacts/
          cp ${FILOGIC}/config.buildinfo artifacts/

          # Generate sha256sums
          cd artifacts
          sha256sum \
            openwrt-mediatek-filogic-${PREFIX}-nvme-img.bin \
            openwrt-mediatek-filogic-${PREFIX}-sdcard.img.gz \
            openwrt-mediatek-filogic-${PREFIX}-emmc-img.bin \
            ${ITB} \
            > sha256sums

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            RAM: ${{ github.event.inputs.ram }}
            Variant: ${{ github.event.inputs.variant }}
            Target: ${{ github.event.inputs.target }}
            Repository commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
