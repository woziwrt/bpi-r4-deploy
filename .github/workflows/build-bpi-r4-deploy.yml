name: Build BPI-R4 Deploy

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'standard'
        type: choice
        options:
          - standard
          - wired
      repo_commit:
        description: 'Commit hash of this repository (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENWRT_COMMIT: "12e56ac8d4bc056768c962796f55531a6da2b4cf"
  MTK_COMMIT: "14dc256bd536382ea427712eb3896e669beeae71"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.repo_commit || github.sha }}

      - name: Set build variables
        run: |
          VARIANT="${{ github.event.inputs.variant }}"

          if [ "$VARIANT" = "wired" ]; then
            echo "BUILDER=./builder-wired-universal.sh" >> $GITHUB_ENV
            echo "RELEASE_TAGS=release-4gb-wired release-4gb-poe-wired release-8gb-wired release-8gb-poe-wired release-8gb-wired-unifi release-8gb-poe-wired-unifi" >> $GITHUB_ENV
          else
            echo "BUILDER=./builder-universal.sh" >> $GITHUB_ENV
            echo "RELEASE_TAGS=release-4gb-standard release-4gb-poe release-8gb-standard release-8gb-poe" >> $GITHUB_ENV
          fi

      - name: Delete existing releases and tags
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tags = process.env.RELEASE_TAGS.split(' ');

            const releases = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });

            for (const tag of tags) {
              for (const rel of releases.data) {
                if (rel.tag_name === tag) {
                  await github.rest.repos.deleteRelease({
                    owner,
                    repo,
                    release_id: rel.id
                  }).catch(e => console.log(`Failed to delete release ${rel.id}: ${e.message}`));
                }
              }
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`
              }).catch(e => console.log(`Failed to delete tag ${tag}: ${e.message}`));
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space on runner
        run: |
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/ghc \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache git

      - name: Restore repository cache
        id: cache-repos
        uses: actions/cache@v4
        with:
          path: |
            repo-cache/openwrt.tar.gz
            repo-cache/mtk-openwrt-feeds.tar.gz
          key: repos-${{ env.OPENWRT_COMMIT }}-${{ env.MTK_COMMIT }}

      - name: Clone and cache repositories
        if: steps.cache-repos.outputs.cache-hit != 'true'
        run: |
          mkdir -p repo-cache

          git clone --branch openwrt-25.12 https://github.com/openwrt/openwrt.git openwrt-clone
          cd openwrt-clone && git checkout ${{ env.OPENWRT_COMMIT }} && cd ..
          tar -czf repo-cache/openwrt.tar.gz openwrt-clone
          rm -rf openwrt-clone

          git clone --branch master https://git01.mediatek.com/openwrt/feeds/mtk-openwrt-feeds mtk-clone
          cd mtk-clone && git checkout ${{ env.MTK_COMMIT }} && cd ..
          tar -czf repo-cache/mtk-openwrt-feeds.tar.gz mtk-clone
          rm -rf mtk-clone

      - name: Run builder script
        run: |
          chmod +x ${{ env.BUILDER }}
          ${{ env.BUILDER }}
        env:
          OPENWRT_COMMIT: ${{ env.OPENWRT_COMMIT }}
          MTK_COMMIT: ${{ env.MTK_COMMIT }}

      - name: Prepare release artifacts
        run: |
          VARIANT="${{ github.event.inputs.variant }}"
          FILOGIC="openwrt/bin/targets/mediatek/filogic"

          # Prepare artifact directory for one release tag
          # Args: dir, itb_src, itb_dst, nvme, sdcard, emmc, snand
          make_release_dir() {
            local DIR="$1"
            local ITB_SRC="$2"
            local ITB_DST="$3"
            local NVME="$4"
            local SDCARD="$5"
            local EMMC="$6"
            local SNAND="$7"

            mkdir -p "$DIR"
            cp "${FILOGIC}/${ITB_SRC}"   "${DIR}/${ITB_DST}"
            cp "${FILOGIC}/${NVME}"      "${DIR}/${NVME}"
            cp "${FILOGIC}/${SDCARD}"    "${DIR}/${SDCARD}"
            cp "${FILOGIC}/${EMMC}"      "${DIR}/${EMMC}"
            cp "${FILOGIC}/${SNAND}"     "${DIR}/${SNAND}"
            cp "${FILOGIC}/config.buildinfo" "${DIR}/"
            cd "$DIR"
            sha256sum "${ITB_DST}" "${NVME}" "${SDCARD}" "${EMMC}" "${SNAND}" > sha256sums
            cd ..
          }

          # 4GB non-poe
          make_release_dir rel-4gb \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-squashfs-sysupgrade.itb" \
            "bpi-r4.itb" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-nvme-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-sdcard.img.gz" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-emmc-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-snand-img.bin"

          # 4GB PoE
          make_release_dir rel-4gb-poe \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-squashfs-sysupgrade.itb" \
            "bpi-r4-poe.itb" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-nvme-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-sdcard.img.gz" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-emmc-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-snand-img.bin"

          # 8GB non-poe
          make_release_dir rel-8gb \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-8gb-squashfs-sysupgrade.itb" \
            "bpi-r4.itb" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-8gb-nvme-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-8gb-sdcard.img.gz" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-8gb-emmc-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-8gb-snand-img.bin"

          # 8GB PoE
          make_release_dir rel-8gb-poe \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8gb-squashfs-sysupgrade.itb" \
            "bpi-r4-poe.itb" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8gb-nvme-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8gb-sdcard.img.gz" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8gb-emmc-img.bin" \
            "openwrt-mediatek-filogic-bananapi_bpi-r4-poe-8gb-snand-img.bin"

          # UniFi variants = same artifacts as 8gb wired, separate tags
          if [ "$VARIANT" = "wired" ]; then
            cp -r rel-8gb     rel-8gb-unifi
            cp -r rel-8gb-poe rel-8gb-poe-unifi
          fi

      - name: Publish release-4gb-standard
        if: github.event.inputs.variant == 'standard'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-4gb-standard
          name: "BPI-R4 4GB standard WiFi (latest)"
          body: |
            Variant: standard (WiFi) | RAM: 4GB
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-4gb/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-4gb-poe
        if: github.event.inputs.variant == 'standard'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-4gb-poe
          name: "BPI-R4 4GB PoE WiFi (latest)"
          body: |
            Variant: standard (WiFi) | RAM: 4GB | PoE
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-4gb-poe/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-8gb-standard
        if: github.event.inputs.variant == 'standard'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-8gb-standard
          name: "BPI-R4 8GB standard WiFi (latest)"
          body: |
            Variant: standard (WiFi) | RAM: 8GB
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-8gb/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-8gb-poe
        if: github.event.inputs.variant == 'standard'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-8gb-poe
          name: "BPI-R4 8GB PoE WiFi (latest)"
          body: |
            Variant: standard (WiFi) | RAM: 8GB | PoE
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-8gb-poe/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-4gb-wired
        if: github.event.inputs.variant == 'wired'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-4gb-wired
          name: "BPI-R4 4GB wired (latest)"
          body: |
            Variant: wired (no WiFi) | RAM: 4GB
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-4gb/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-4gb-poe-wired
        if: github.event.inputs.variant == 'wired'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-4gb-poe-wired
          name: "BPI-R4 4GB PoE wired (latest)"
          body: |
            Variant: wired (no WiFi) | RAM: 4GB | PoE
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-4gb-poe/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-8gb-wired
        if: github.event.inputs.variant == 'wired'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-8gb-wired
          name: "BPI-R4 8GB wired (latest)"
          body: |
            Variant: wired (no WiFi) | RAM: 8GB
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-8gb/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-8gb-poe-wired
        if: github.event.inputs.variant == 'wired'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-8gb-poe-wired
          name: "BPI-R4 8GB PoE wired (latest)"
          body: |
            Variant: wired (no WiFi) | RAM: 8GB | PoE
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-8gb-poe/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-8gb-wired-unifi
        if: github.event.inputs.variant == 'wired'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-8gb-wired-unifi
          name: "BPI-R4 8GB wired UniFi (latest)"
          body: |
            Variant: wired (no WiFi) | RAM: 8GB | UniFi stack
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-8gb-unifi/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-8gb-poe-wired-unifi
        if: github.event.inputs.variant == 'wired'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-8gb-poe-wired-unifi
          name: "BPI-R4 8GB PoE wired UniFi (latest)"
          body: |
            Variant: wired (no WiFi) | RAM: 8GB | PoE | UniFi stack
            Commit: ${{ github.event.inputs.repo_commit || github.sha }}
          files: rel-8gb-poe-unifi/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
